# Martin config template.
# O container/entrypoint monta a MARTIN_DATABASE_URL a partir das variaveis DB_*.
# Este arquivo nao contem senha fixa.
# Docs: https://maplibre.org/martin/config-file/

listen_addresses: ${MARTIN_LISTEN_ADDRESSES:-0.0.0.0:3000}

postgres:
  connection_string: ${MARTIN_DATABASE_URL}
  default_srid: ${MARTIN_DEFAULT_SRID:-4326}
  auto_publish:
    tables:
      from_schemas:
        - ${DB_SCHEMA_RESOURCES:-public}
      source_id_format: "{schema}.{table}"
      id_columns: [id, gid, ogc_fid]
      clip_geom: true
      buffer: 64
      extent: 2048
